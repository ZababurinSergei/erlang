# Dialyzer ignore configuration for kafka_demo project
# Format: Regular expression patterns to match warnings to ignore

# Ignore brod/kpro unknown type warnings (dependencies)
^.*Unknown type kpro:.*$

# Ignore brod:subscribe contract warnings (external API mismatch)
^.*The call brod:subscribe.*breaks the contract.*$

# Ignore start_link/1 no local return warning (test mode handling)
^src/kafka_console_printer.erl:.*: Function start_link/1 has no local return$

# Ignore application:start/2 return type warning (behaviour callback)
^src/kafka_demo_app.erl:.*:The inferred return type of start/2.*has nothing in common with the expected return type$

# Ignore other dependency-related warnings
^.*Unknown type kpro:incomplete_batch/0$
^.*Unknown type kpro:topic/0$
^.*Unknown type kpro:partition/0$
^.*Unknown type kpro:offset/0$
^.*Unknown type kpro:message/0$
^.*Unknown type kpro:error_code/0$
^.*Unknown type kpro:group_id/0$
^.*Unknown type kpro:bytes/0$
^.*Unknown type kpro:timestamp_type/0$
^.*Unknown type kpro:int64/0$
^.*Unknown type kpro:headers/0$